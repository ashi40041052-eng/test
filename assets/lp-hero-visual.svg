    <line x1="360" y1="340" x2="390" y2="340"/><line x1="375" y1="325" x2="375" y2="355"/>
    <line x1="1120" y1="290" x2="1150" y2="290"/><line x1="1135" y1="275" x2="1135" y2="305"/>
    <line x1="1420" y1="250" x2="1450" y2="250"/><line x1="1435" y1="235" x2="1435" y2="265"/>
  </g>

  <g fill="#120726">
