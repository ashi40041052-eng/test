<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A1353"/>
      <stop offset="1" stop-color="#B03BA4"/>
    </linearGradient>
    <radialGradient id="lightPink" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 180) rotate(40) scale(380 280)">
      <stop stop-color="#FFB2E9" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFB2E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lightBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 220) rotate(30) scale(420 300)">
