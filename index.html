<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>アイドルオーディション LP</title>
  <style>
    :root {
      --bg: #fff5fb;
      --max-width: 1400px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
    }

    .lp-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .lp-image {
      width: 100%;
      max-width: var(--max-width);
      height: auto;
      display: block;
    }

    @media (min-width: 1200px) {
      .lp-wrap {
        padding: 16px 0 32px;
      }

      .lp-image {
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(255, 105, 180, 0.18);
      }
    }
  </style>
</head>
<body>
  <main class="lp-wrap">
    <img
      class="lp-image"
      src="assets/lp-hero-visual.svg"
      alt="アイドルオーディション ランディングページ"
      loading="eager"
      fetchpriority="high"
    />
  </main>
</body>
</html>
